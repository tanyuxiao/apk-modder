<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>APK Rebuilder - 嵌入版</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #10b981;
      --primary-dark: #0f9f6e;
      --danger: #ef4444;
      --radius: 10px;
      --steps-line: #e2e8f0;
      --dot: #cbd5e1;
      --secondary: #475569;
      --active: #0ea5e9;
      --pre-bg: #0b1220;
      --pre-text: #e2e8f0;
      --file-btn-bg: #e0f2fe;
      --file-btn-bg-hover: #bae6fd;
      --file-btn-border: #e2e8f0;
      --file-btn-border-hover: #38bdf8;
      --file-btn-text: #0f172a;
      --font-family-base: "SF Pro Text", "PingFang SC", "Noto Sans", "Segoe UI", system-ui, -apple-system, sans-serif;
      --font-weight-bold: 700;
      --border-thin: 1px;
      --title-margin: 4px 0 14px;
      --section-title-margin: 0 0 10px;
      --app-width: 100%;
      --app-height: 100%;
      --font-size-title: 18px;
      --font-size-section-title: 14px;
      --font-size-label: 12px;
      --font-size-input: 14px;
      --font-size-file: 13px;
      --font-size-hint: 12px;
      --font-size-step: 12px;
      --font-size-progress: 12px;
      --font-size-button: 14px;
      --font-size-pre: 12px;
      --font-size-slider: 12px;
      --container-max-width: 760px;
      --container-margin: 0 auto;
      --container-padding: 18px 18px 24px;
      --container-padding-sm: 14px;
      --section-padding: 14px;
      --section-margin-bottom: 16px;
      --section-radius: 14px;
      --section-shadow-color: rgba(15, 23, 42, 0.04);
      --section-shadow: 0 8px 20px var(--section-shadow-color);
      --form-row-padding: 12px;
      --form-row-padding-sm: 10px;
      --form-row-margin-bottom: 12px;
      --label-margin-bottom: 8px;
      --label-letter-spacing: 0.2px;
      --input-padding: 9px 12px;
      --input-radius: 8px;
      --file-btn-padding: 7px 12px;
      --file-btn-radius: 8px;
      --file-btn-margin-right: 10px;
      --file-btn-font-size: 13px;
      --focus-border-color: #86efac;
      --focus-ring-color: rgba(16,185,129,0.18);
      --focus-ring: 0 0 0 3px var(--focus-ring-color);
      --hint-margin-top: 6px;
      --actions-gap: 8px;
      --actions-gap-sm: 6px;
      --icon-preview-size: 96px;
      --icon-preview-radius: 16px;
      --icon-preview-border: 1px dashed var(--line);
      --icon-preview-hover-border-color: #86efac;
      --icon-preview-hover-shadow: 0 0 0 3px rgba(16,185,129,0.12);
      --icon-preview-margin-top: 10px;
      --icon-preview-transition: border-color 0.15s ease, box-shadow 0.15s ease;
      --steps-gap: 12px;
      --steps-margin-top: 8px;
      --steps-padding: 6px 4px 0;
      --steps-line-top: 11px;
      --steps-line-inset: 12px;
      --steps-line-height: 2px;
      --step-gap: 6px;
      --step-min-width: 72px;
      --step-dot-size: 10px;
      --step-dot-radius: 999px;
      --step-active: #10b981;
      --step-done: #22c55e;
      --step-failed: #ef4444;
      --progress-margin-top: 6px;
      --progress-text-display: none;
      --button-padding: 9px 14px;
      --button-radius: 8px;
      --button-text-color: #ffffff;
      --button-transition: background 0.15s ease, transform 0.05s ease;
      --button-active-translate: 1px;
      --button-disabled-bg: #94a3b8;
      --pre-margin-top: 12px;
      --pre-padding: 10px;
      --pre-radius: 8px;
      --pre-min-height: 80px;
      --download-margin-top: 8px;
      --download-btn-padding: 6px 12px;
      --download-btn-radius: 6px;
      --download-btn-bg: #16a34a;
      --download-btn-text: #ffffff;
      --download-btn-decoration: none;
      --status-banner-padding: 8px 12px;
      --status-banner-radius: 8px;
      --status-banner-bg: #fef2f2;
      --status-banner-text: #991b1b;
      --status-banner-border: 1px solid #fecaca;
      --admin-item-padding: 6px 0;
      --admin-item-gap: 8px;
      --admin-item-border: 1px solid var(--admin-divider-color);
      --admin-divider-color: #f1f5f9;
      --admin-meta-gap: 2px;
      --admin-title-size: 13px;
      --admin-actions-gap: 6px;
      --badge-padding: 2px 6px;
      --badge-radius: 999px;
      --badge-current-bg: #dcfce7;
      --badge-current-text: #166534;
      --badge-previous-bg: #fee2e2;
      --badge-previous-text: #7f1d1d;
      --hidden-input-display: none;
      --modal-mask-bg: rgba(0, 0, 0, 0.45);
      --modal-z-index: 1000;
      --modal-card-bg: #ffffff;
      --modal-card-radius: 8px;
      --modal-card-padding: 16px;
      --modal-card-width: 560px;
      --modal-card-max-width: 90vw;
      --modal-card-shadow-color: rgba(0,0,0,0.25);
      --modal-card-shadow: 0 10px 30px var(--modal-card-shadow-color);
      --modal-header-margin-bottom: 12px;
      --modal-body-gap: 10px;
      --slider-row-gap: 8px;
      --modal-actions-gap: 8px;
      --modal-actions-margin-top: 8px;
      --slider-row-color: #444444;
      --icon-editor-border: 1px solid #e5e7eb;
    }
    body[data-mode="dark"] {
      --bg: #0b0f17;
      --panel: #101826;
      --panel-2: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #1f2937;
      --primary: #34d399;
      --primary-dark: #10b981;
      --danger: #f87171;
      --steps-line: #233043;
      --dot: #334155;
      --secondary: #334155;
      --active: #38bdf8;
      --pre-bg: #0a0f1a;
      --pre-text: #d1d5db;
      --file-btn-bg: #1f2937;
      --file-btn-bg-hover: #273449;
      --file-btn-border: #334155;
      --file-btn-border-hover: #475569;
      --file-btn-text: #e2e8f0;
      --section-shadow-color: rgba(0, 0, 0, 0.45);
      --focus-border-color: #34d399;
      --focus-ring-color: rgba(52,211,153,0.24);
      --icon-preview-hover-border-color: #34d399;
      --icon-preview-hover-shadow: 0 0 0 3px rgba(52,211,153,0.18);
      --step-active: #34d399;
      --step-done: #22c55e;
      --step-failed: #f87171;
      --button-disabled-bg: #475569;
      --modal-card-bg: #0f172a;
      --modal-card-shadow-color: rgba(0,0,0,0.55);
      --slider-row-color: #cbd5e1;
      --icon-editor-border: 1px solid #1f2937;
      --admin-divider-color: #1f2937;
      --badge-current-bg: rgba(34, 197, 94, 0.2);
      --badge-current-text: #86efac;
      --badge-previous-bg: rgba(248, 113, 113, 0.2);
      --badge-previous-text: #fca5a5;
      --download-btn-bg: #22c55e;
      --download-btn-text: #0b0f17;
    }
    body { margin: 0; background: var(--bg); color: var(--text); }
    #app { width: var(--app-width); height: var(--app-height); }
    .container {
      box-sizing: border-box;
      max-width: var(--container-max-width);
      margin: var(--container-margin);
      padding: var(--container-padding);
      font-family: var(--font-family-base);
    }
    .title {
      font-size: var(--font-size-title);
      font-weight: var(--font-weight-bold);
      margin: var(--title-margin);
    }
    .section {
      background: var(--panel);
      border: var(--border-thin) solid var(--line);
      border-radius: var(--section-radius);
      padding: var(--section-padding);
      margin-bottom: var(--section-margin-bottom);
      box-shadow: var(--section-shadow);
    }
    .section-title {
      font-size: var(--font-size-section-title);
      font-weight: var(--font-weight-bold);
      margin: var(--section-title-margin);
      color: var(--text);
    }
    .form-row {
      margin-bottom: var(--form-row-margin-bottom);
      border: var(--border-thin) solid var(--line);
      border-radius: var(--radius);
      padding: var(--form-row-padding);
    }
    label {
      display: block;
      font-size: var(--font-size-label);
      color: var(--muted);
      margin-bottom: var(--label-margin-bottom);
      letter-spacing: var(--label-letter-spacing);
    }
    input[type="text"],
    select {
      width: 100%;
      padding: var(--input-padding);
      border: var(--border-thin) solid var(--line);
      border-radius: var(--input-radius);
      font-size: var(--font-size-input);
      box-sizing: border-box;
      background: var(--panel-2);
      color: var(--text);
    }
    input[type="file"] {
      font-size: var(--font-size-file);
      color: var(--muted);
    }
    .hidden-input {
      display: var(--hidden-input-display);
    }
    input[type="file"]::file-selector-button {
      padding: var(--file-btn-padding);
      margin-right: var(--file-btn-margin-right);
      border: var(--border-thin) solid var(--file-btn-border);
      border-radius: var(--file-btn-radius);
      background: var(--file-btn-bg);
      color: var(--file-btn-text);
      cursor: pointer;
      font-size: var(--file-btn-font-size);
    }
    input[type="file"]::file-selector-button:hover {
      border-color: var(--file-btn-border-hover);
      background: var(--file-btn-bg-hover);
      color: var(--file-btn-text);
    }
    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: var(--focus-border-color);
      box-shadow: var(--focus-ring);
    }
    .hint {
      font-size: var(--font-size-hint);
      color: var(--muted);
      margin-top: var(--hint-margin-top);
    }
    .actions {
      display: flex;
      gap: var(--actions-gap);
      align-items: center;
      flex-wrap: wrap;
    }
    .icon-preview {
      margin-top: var(--icon-preview-margin-top);
      width: var(--icon-preview-size);
      height: var(--icon-preview-size);
      border-radius: var(--icon-preview-radius);
      border: var(--icon-preview-border);
      background: var(--panel-2);
      display: grid;
      place-items: center;
      color: var(--muted);
      cursor: pointer;
      overflow: hidden;
      transition: var(--icon-preview-transition);
    }
    .icon-preview:hover {
      border-color: var(--icon-preview-hover-border-color);
      box-shadow: var(--icon-preview-hover-shadow);
    }
    .icon-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .icon-empty {
      font-size: var(--font-size-hint);
      color: var(--muted);
    }
    .steps {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--steps-gap);
      margin-top: var(--steps-margin-top);
      position: relative;
      padding: var(--steps-padding);
    }
    .steps::before {
      content: '';
      position: absolute;
      left: var(--steps-line-inset);
      right: var(--steps-line-inset);
      top: var(--steps-line-top);
      height: var(--steps-line-height);
      background: var(--steps-line);
      z-index: 0;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--step-gap);
      color: var(--muted);
      font-size: var(--font-size-step);
      min-width: var(--step-min-width);
      z-index: 1;
    }
    .step .dot {
      width: var(--step-dot-size);
      height: var(--step-dot-size);
      border-radius: var(--step-dot-radius);
      background: var(--dot);
    }
    .step.active .dot {
      background: var(--step-active);
    }
    .step.done .dot {
      background: var(--step-done);
    }
    .step.failed .dot {
      background: var(--step-failed);
    }
    .progress-text {
      font-size: var(--font-size-progress);
      color: var(--muted);
      margin-top: var(--progress-margin-top);
      display: var(--progress-text-display);
    }
    button, .btn {
      padding: var(--button-padding);
      background: var(--primary);
      border: none;
      color: var(--button-text-color);
      border-radius: var(--button-radius);
      cursor: pointer;
      font-size: var(--font-size-button);
      transition: var(--button-transition);
    }
    button:hover, .btn:hover { background: var(--primary-dark); }
    button:active, .btn:active { transform: translateY(var(--button-active-translate)); }
    button.secondary {
      background: var(--secondary);
    }
    button.active {
      background: var(--active);
    }
    button.danger {
      background: var(--danger);
    }
    button:disabled {
      background: var(--button-disabled-bg);
      cursor: not-allowed;
    }
    pre {
      margin-top: var(--pre-margin-top);
      background: var(--pre-bg);
      color: var(--pre-text);
      padding: var(--pre-padding);
      border-radius: var(--pre-radius);
      font-size: var(--font-size-pre);
      white-space: pre-wrap;
      word-break: break-all;
      min-height: var(--pre-min-height);
    }
    #downloadArea {
      margin-top: var(--download-margin-top);
      display: flex;
      justify-content: center;
    }
    .download-btn {
      display: inline-block;
      padding: var(--download-btn-padding);
      border-radius: var(--download-btn-radius);
      background: var(--download-btn-bg);
      color: var(--download-btn-text);
      text-decoration: var(--download-btn-decoration);
    }
    .status-banner {
      margin-top: var(--download-margin-top);
      padding: var(--status-banner-padding);
      border-radius: var(--status-banner-radius);
      background: var(--status-banner-bg);
      color: var(--status-banner-text);
      font-size: var(--font-size-hint);
      display: none;
      border: var(--status-banner-border);
    }
    .status-banner.visible {
      display: block;
    }
    @media (max-width: 680px) {
      .container { padding: var(--container-padding-sm); }
      .form-row { padding: var(--form-row-padding-sm); }
      .actions { gap: var(--actions-gap-sm); }
    }
    .modal-mask {
      position: fixed;
      inset: 0;
      background: var(--modal-mask-bg);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: var(--modal-z-index);
    }
    .modal-mask.open {
      display: flex;
    }
    .modal-card {
      background: var(--modal-card-bg);
      border-radius: var(--modal-card-radius);
      padding: var(--modal-card-padding);
      width: var(--modal-card-width);
      max-width: var(--modal-card-max-width);
      box-shadow: var(--modal-card-shadow);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--modal-header-margin-bottom);
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: var(--modal-body-gap);
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: var(--slider-row-gap);
      font-size: var(--font-size-slider);
      color: var(--slider-row-color);
    }
    .slider-row input[type="range"] {
      flex: 1;
    }
    .modal-actions {
      display: flex;
      gap: var(--modal-actions-gap);
      justify-content: flex-end;
      margin-top: var(--modal-actions-margin-top);
    }
    #iconEditorCanvas {
      border: var(--icon-editor-border);
    }
    .admin-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--admin-item-gap);
      padding: var(--admin-item-padding);
      border-bottom: var(--admin-item-border);
    }
    .admin-list-meta {
      display: flex;
      flex-direction: column;
      gap: var(--admin-meta-gap);
    }
    .admin-list-title {
      font-size: var(--admin-title-size);
    }
    .admin-list-actions {
      display: flex;
      gap: var(--admin-actions-gap);
    }
    .badge {
      display: inline-block;
      padding: var(--badge-padding);
      border-radius: var(--badge-radius);
      font-size: var(--font-size-label);
    }
    .badge-current {
      background: var(--badge-current-bg);
      color: var(--badge-current-text);
    }
    .badge-previous {
      background: var(--badge-previous-bg);
      color: var(--badge-previous-text);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./embed.main.js"></script>
</body>
</html>
