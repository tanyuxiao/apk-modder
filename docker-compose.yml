services:
  apk-modder:
    image: ${APK_MODDER_IMAGE:-ghcr.io/tanyuxiao/apk-modder:latest}
    pull_policy: always
    ports:
      - '3000:3000'
    volumes:
      # Persist app runtime data in a Docker named volume (faster than macOS bind mount for many small files)
      - apk_modder_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - APKTOOL_PATH=/usr/local/bin/apktool
      - ZIPALIGN_PATH=/usr/local/bin/zipalign
      - APKSIGNER_PATH=/usr/local/bin/apksigner
      - KEYTOOL_PATH=keytool
      - DEBUG_KEY_ALIAS=androiddebugkey
      - DEBUG_KEY_PASS=android
    restart: unless-stopped

volumes:
  apk_modder_data:
